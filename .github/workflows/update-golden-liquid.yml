name: Update Golden Liquid Tests

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    env:
      PR_CHECKS_WORKFLOW: pr.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get current hash from version file
        id: current
        run: |
          CURRENT_HASH=$(cat .github/golden-liquid-version.txt | tr -d '\n')
          echo "hash=$CURRENT_HASH" >> $GITHUB_OUTPUT
          echo "Current hash: $CURRENT_HASH"

      - name: Get latest hash from golden-liquid repo
        id: latest
        run: |
          LATEST_HASH=$(curl -s "https://api.github.com/repos/jg-rp/golden-liquid/commits?per_page=1" | jq -r '.[0].sha')
          echo "hash=$LATEST_HASH" >> $GITHUB_OUTPUT
          echo "Latest hash: $LATEST_HASH"

      - name: Check if update is needed
        id: check
        run: |
          if [ "${{ steps.current.outputs.hash }}" = "${{ steps.latest.outputs.hash }}" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Already up to date!"
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Update needed: ${{ steps.current.outputs.hash }} -> ${{ steps.latest.outputs.hash }}"
          fi

      - name: Update hash in version file
        if: steps.check.outputs.needs_update == 'true'
        run: |
          echo "${{ steps.latest.outputs.hash }}" > .github/golden-liquid-version.txt
          echo "Updated .github/golden-liquid-version.txt"

      - name: Delete cached golden liquid file
        if: steps.check.outputs.needs_update == 'true'
        run: |
          # The test file caches the JSON locally, so we need to ensure it gets re-downloaded
          # This is handled automatically since the filename includes the hash
          echo "Cache will be refreshed automatically (filename includes hash)"

      - name: Create Pull Request
        id: create-pr
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update Golden Liquid tests to ${{ steps.latest.outputs.hash }}"
          title: "Update Golden Liquid tests"
          body: |
            This PR updates the Golden Liquid test suite to the latest version.

            **Changes:**
            - Updated from `${{ steps.current.outputs.hash }}` to `${{ steps.latest.outputs.hash }}`

            **Golden Liquid Repository:**
            https://github.com/jg-rp/golden-liquid

            **Latest Commit:**
            https://github.com/jg-rp/golden-liquid/commit/${{ steps.latest.outputs.hash }}

            ---
            *This PR was automatically created by the update-golden-liquid workflow.*
          branch: update-golden-liquid-${{ steps.latest.outputs.hash }}
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Trigger PR checks
        if: steps.check.outputs.needs_update == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dispatch_status=$(jq -n --arg ref "${{ steps.create-pr.outputs.pull-request-branch }}" '{ ref: $ref }' | \
            curl --silent --show-error \
              --output /tmp/pr-check-dispatch-response.txt \
              --write-out "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${PR_CHECKS_WORKFLOW}/dispatches" \
              --data @-)

          if [ "$dispatch_status" != "204" ]; then
            echo "Failed to dispatch PR checks workflow (HTTP $dispatch_status)."
            cat /tmp/pr-check-dispatch-response.txt
            exit 1
          fi

      - name: Enable auto-merge
        if: steps.check.outputs.needs_update == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                mergeCommitAllowed
                rebaseMergeAllowed
                squashMergeAllowed
                pullRequest(number: $number) {
                  id
                  autoMergeRequest {
                    enabledAt
                  }
                }
              }
            }
          '

          variables=$(jq -n \
            --arg owner "${{ github.repository_owner }}" \
            --arg repo "${{ github.event.repository.name }}" \
            --argjson number "${{ steps.create-pr.outputs.pull-request-number }}" \
            '{ owner: $owner, repo: $repo, number: $number }')

          graphql_status=$(jq -n --arg query "$query" --argjson variables "$variables" '{ query: $query, variables: $variables }' | \
            curl --silent --show-error \
              --output /tmp/auto-merge-query-response.json \
              --write-out "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              https://api.github.com/graphql \
              --data @-)

          if [ "$graphql_status" != "200" ]; then
            echo "Failed to query pull request metadata for auto-merge (HTTP $graphql_status)."
            cat /tmp/auto-merge-query-response.json
            exit 1
          fi

          response=$(cat /tmp/auto-merge-query-response.json)

          if [ "$(echo "$response" | jq -r 'has("errors")')" = "true" ]; then
            echo "Failed to query pull request metadata for auto-merge."
            echo "$response" | jq '.errors'
            exit 1
          fi

          if [ "$(echo "$response" | jq -r '.data.repository.pullRequest.autoMergeRequest != null')" = "true" ]; then
            echo "Auto-merge is already enabled."
            exit 0
          fi

          pull_request_id=$(echo "$response" | jq -r '.data.repository.pullRequest.id')
          merge_method=$(echo "$response" | jq -r '
            if .data.repository.squashMergeAllowed then "SQUASH"
            elif .data.repository.rebaseMergeAllowed then "REBASE"
            elif .data.repository.mergeCommitAllowed then "MERGE"
            else empty
            end')

          if [ -z "$pull_request_id" ] || [ -z "$merge_method" ]; then
            echo "Unable to determine PR id or allowed merge method."
            exit 1
          fi

          mutation='
            mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
              enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: $mergeMethod }) {
                clientMutationId
              }
            }
          '

          mutation_variables=$(jq -n \
            --arg pullRequestId "$pull_request_id" \
            --arg mergeMethod "$merge_method" \
            '{ pullRequestId: $pullRequestId, mergeMethod: $mergeMethod }')

          mutation_status=$(jq -n --arg query "$mutation" --argjson variables "$mutation_variables" '{ query: $query, variables: $variables }' | \
            curl --silent --show-error \
              --output /tmp/auto-merge-mutation-response.json \
              --write-out "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              https://api.github.com/graphql \
              --data @-)

          if [ "$mutation_status" != "200" ]; then
            echo "Failed to enable auto-merge for the pull request (HTTP $mutation_status)."
            cat /tmp/auto-merge-mutation-response.json
            exit 1
          fi

          mutation_response=$(cat /tmp/auto-merge-mutation-response.json)

          if [ "$(echo "$mutation_response" | jq -r 'has("errors")')" = "true" ]; then
            echo "Failed to enable auto-merge for the pull request."
            echo "$mutation_response" | jq '.errors'
            exit 1
          fi
